<div id="game-container" class="shell shell-play">
    <div class="frame frame-play">
        <header class="topbar">
            <button
                hx-post="/reset"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="ghost-button">
                ← Back
            </button>
            <div class="title-block title-block-compact">
                <p class="eyebrow">Social Bingo</p>
                <h1>Soc Ops</h1>
            </div>
        </header>

        <p class="intro intro-compact">Tap a square when you meet someone who matches it.</p>

        {% if session.has_bingo %}
        <div class="status-banner" role="status" aria-live="polite">
            Bingo. You completed a full line.
        </div>
        {% endif %}

        <div class="board-wrap">
            <div class="board" role="grid" aria-label="Social Bingo board">
                {% for square in session.board %}
                {% set is_winning = square.id in session.winning_square_ids %}
                <button
                    {% if not square.is_free_space %}
                    hx-post="/toggle/{{ square.id }}"
                    hx-target="#game-container"
                    hx-swap="outerHTML"
                    {% endif %}
                    {% if square.is_free_space %}disabled{% endif %}
                    class="square{% if square.is_marked %} square-marked{% endif %}{% if is_winning %} square-winning{% endif %}{% if square.is_free_space %} square-free{% endif %}"
                    aria-pressed="{{ 'true' if square.is_marked else 'false' }}"
                    aria-label="{{ 'Free space' if square.is_free_space else square.text }}">
                    <span class="square-text">{{ square.text }}</span>
                    {% if square.is_marked and not square.is_free_space %}
                    <span class="square-check" aria-hidden="true">+</span>
                    {% endif %}
                </button>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
