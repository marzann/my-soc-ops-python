<div id="game-container" class="shell">
    <div class="frame frame-start">
        <div class="title-block">
            <p class="eyebrow">Social Bingo</p>
            <h1>Soc Ops</h1>
        </div>

        <p class="intro">
            A quiet, fast card for in-person mixers. Mark people you find and complete any line.
        </p>

        <ul class="rules" aria-label="How to play">
            <li>Find people who match the prompts.</li>
            <li>Mark each match as you go.</li>
            <li>Complete any row, column, or diagonal.</li>
        </ul>

        <button
            hx-post="/start"
            hx-target="#game-container"
            hx-swap="outerHTML"
            class="primary-button">
            Start Game
        </button>
    </div>
</div>
